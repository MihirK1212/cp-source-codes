<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if page.title %}{{ page.title }}{% else %}{{ page.name | replace: '.md', '' | replace: '.html', '' }}{% endif %}</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/github-markdown-css/5.5.1/github-markdown.min.css" crossorigin="anonymous">
  <style>
    *, *::before, *::after { box-sizing: border-box; }

    body {
      margin: 0;
      background: #f6f8fa;
      color: #24292f;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    }

    /* ── Top header bar ───────────────────────────────────────────── */
    .site-header {
      position: sticky;
      top: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      gap: 12px;
      height: 52px;
      padding: 0 20px;
      background: #24292f;
      color: #fff;
      border-bottom: 1px solid #444c56;
    }
    .site-header a {
      color: #fff;
      text-decoration: none;
      font-weight: 600;
      font-size: 15px;
      letter-spacing: 0.01em;
    }
    .site-header a:hover { color: #58a6ff; }

    /* hamburger (mobile only) */
    .menu-toggle {
      display: none;
      background: none;
      border: none;
      cursor: pointer;
      padding: 4px;
      color: #fff;
      margin-left: auto;
    }
    .menu-toggle svg { display: block; }

    /* ── Page body: sidebar + content ─────────────────────────────── */
    .site-body {
      display: flex;
      min-height: calc(100vh - 52px);
    }

    /* ── Sidebar ──────────────────────────────────────────────────── */
    .sidebar {
      width: 252px;
      flex-shrink: 0;
      background: #fff;
      border-right: 1px solid #d0d7de;
      overflow-y: auto;
      position: sticky;
      top: 52px;
      height: calc(100vh - 52px);
      padding: 16px 0 32px;
    }

    .sidebar-section-title {
      padding: 6px 16px 4px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #57606a;
    }

    .sidebar nav ul {
      list-style: none;
      margin: 0;
      padding: 0;
    }

    .sidebar nav ul li { margin: 0; }

    .sidebar nav ul li a {
      display: block;
      padding: 5px 16px 5px 16px;
      font-size: 13.5px;
      color: #24292f;
      text-decoration: none;
      border-radius: 0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      line-height: 1.5;
    }
    .sidebar nav ul li a:hover {
      background: #f6f8fa;
      color: #0969da;
    }
    .sidebar nav ul li a.active {
      background: #dbeafe;
      color: #0550ae;
      font-weight: 600;
      border-left: 3px solid #0969da;
      padding-left: 13px;
    }

    /* child items (CSES / USACO sub-sections) */
    .sidebar nav ul ul li a {
      padding-left: 28px;
      font-size: 13px;
      color: #57606a;
    }
    .sidebar nav ul ul li a:hover {
      background: #f6f8fa;
      color: #0969da;
    }
    .sidebar nav ul ul li a.active {
      padding-left: 25px;
    }

    /* collapse/expand toggle for parent items with children */
    .nav-parent {
      display: flex;
      align-items: center;
    }
    .nav-parent > a { flex: 1; min-width: 0; }
    .nav-toggle {
      background: none;
      border: none;
      cursor: pointer;
      padding: 5px 10px 5px 4px;
      color: #57606a;
      font-size: 10px;
      line-height: 1;
      flex-shrink: 0;
    }
    .nav-toggle:hover { color: #0969da; }

    /* collapsed child list hidden by default */
    .nav-children { display: none; }
    .nav-children.open { display: block; }

    /* divider between top-level groups */
    .sidebar-divider {
      height: 1px;
      background: #d0d7de;
      margin: 10px 16px;
    }

    /* ── Main content ─────────────────────────────────────────────── */
    .main-content {
      flex: 1;
      min-width: 0;
      padding: 32px 40px;
    }

    .markdown-body {
      box-sizing: border-box;
      max-width: 900px;
      background: #fff;
      border: 1px solid #d0d7de;
      border-radius: 8px;
      padding: 40px 48px;
    }
    .markdown-body .highlight pre {
      margin: 0;
      padding: 16px;
      overflow-x: auto;
      background: #f6f8fa;
      border-radius: 6px;
    }
    .markdown-body pre:not(.highlight pre) {
      padding: 16px;
      overflow-x: auto;
      background: #f6f8fa;
      border-radius: 6px;
    }

    /* ── Mobile ───────────────────────────────────────────────────── */
    @media (max-width: 767px) {
      .menu-toggle { display: flex; }

      .sidebar {
        position: fixed;
        top: 52px;
        left: 0;
        width: 280px;
        height: calc(100vh - 52px);
        z-index: 200;
        transform: translateX(-100%);
        transition: transform 0.22s ease;
        box-shadow: 2px 0 12px rgba(0,0,0,0.12);
      }
      .sidebar.open { transform: translateX(0); }

      .sidebar-overlay {
        display: none;
        position: fixed;
        inset: 52px 0 0;
        background: rgba(0,0,0,0.35);
        z-index: 199;
      }
      .sidebar-overlay.open { display: block; }

      .main-content { padding: 16px; }
      .markdown-body { padding: 20px 16px; }
    }
  </style>
</head>
<body>

  <!-- Top header -->
  <header class="site-header">
    <a href="{{ site.baseurl }}/">CP &amp; DSA Source Codes</a>
    <button class="menu-toggle" aria-label="Toggle navigation" onclick="toggleSidebar()">
      <svg width="20" height="20" viewBox="0 0 20 20" fill="currentColor">
        <rect y="3" width="20" height="2" rx="1"/>
        <rect y="9" width="20" height="2" rx="1"/>
        <rect y="15" width="20" height="2" rx="1"/>
      </svg>
    </button>
  </header>

  <!-- Mobile overlay -->
  <div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>

  <div class="site-body">

    <!-- Left sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-section-title">Topics</div>
      <nav>
        <ul>
          {% for topic in site.data.topics %}
            {% if topic.children %}
              <li>
                <div class="nav-parent">
                  <a href="{{ site.baseurl }}{{ topic.path }}" data-path="{{ topic.path }}">{{ topic.label }}</a>
                  <button class="nav-toggle" aria-label="Expand {{ topic.label }}" onclick="toggleChildren(this)">▶</button>
                </div>
                <ul class="nav-children">
                  {% for child in topic.children %}
                    <li><a href="{{ site.baseurl }}{{ child.path }}" data-path="{{ child.path }}">{{ child.label }}</a></li>
                  {% endfor %}
                </ul>
              </li>
            {% else %}
              <li><a href="{{ site.baseurl }}{{ topic.path }}" data-path="{{ topic.path }}">{{ topic.label }}</a></li>
            {% endif %}
          {% endfor %}
        </ul>
      </nav>
    </aside>

    <!-- Main content -->
    <main class="main-content">
      <article class="markdown-body">
        {{ content }}
      </article>
    </main>

  </div>

  <script>
    (function () {
      var baseurl = "{{ site.baseurl }}";
      var pathname = window.location.pathname;

      // Strip baseurl prefix so we compare only the path portion
      var path = pathname;
      if (baseurl && pathname.startsWith(baseurl)) {
        path = pathname.slice(baseurl.length);
      }
      if (!path.startsWith("/")) path = "/" + path;

      // Highlight matching links; for parent links also open their child list
      var links = document.querySelectorAll(".sidebar a[data-path]");
      links.forEach(function (a) {
        var linkPath = a.getAttribute("data-path");
        if (linkPath === path) {
          a.classList.add("active");
          // Open parent child list if this is a child link
          var childList = a.closest(".nav-children");
          if (childList) {
            childList.classList.add("open");
            var toggle = childList.previousElementSibling
                           ? childList.previousElementSibling.querySelector(".nav-toggle")
                           : null;
            if (!toggle) {
              // nav-parent is the sibling before nav-children
              var parent = childList.parentElement;
              toggle = parent.querySelector(".nav-toggle");
            }
            if (toggle) toggle.textContent = "▼";
          }
          // Also mark parent link active when on a child page
          var navParent = a.closest("li");
          if (navParent) {
            var parentLink = navParent.querySelector(".nav-parent > a");
            if (parentLink && parentLink !== a) parentLink.classList.add("active");
          }
        }
      });
    })();

    function toggleChildren(btn) {
      var li = btn.closest("li");
      var children = li.querySelector(".nav-children");
      if (!children) return;
      var isOpen = children.classList.toggle("open");
      btn.textContent = isOpen ? "▼" : "▶";
    }

    function toggleSidebar() {
      document.getElementById("sidebar").classList.toggle("open");
      document.getElementById("sidebarOverlay").classList.toggle("open");
    }
  </script>

</body>
</html>
